<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendetta External</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    font-size:80px;
    letter-spacing:8px;
    text-transform:uppercase;
    animation: glow 2s ease-in-out infinite alternate;
}

p{
    margin-top:15px;
    color:#888;
    font-size:18px;
    letter-spacing:3px;
}

.line{
    width:250px;
    height:2px;
    background:white;
    margin:20px auto;
    opacity:0.7;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 30px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:white;
    color:black;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #fff,
        0 0 20px #fff;
    }
    to{
        text-shadow:
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 60px #fff;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>VENDETTA</h1>
    <div class="line"></div>
    <p>EXTERNAL PROJECT</p>

    <a href="#" class="btn">
        ENTER
    </a>
</div>

</body>
</html>
